<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Victor AI</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins', sans-serif;

            height:100vh;

            background:
                radial-gradient(circle at top left,#1e293b,#020617);

            color:white;

            display:flex;

            overflow:hidden;
        }

        /* Sidebar */

        .sidebar{

            width:280px;

            background:rgba(15,23,42,0.8);

            backdrop-filter:blur(20px);

            border-right:1px solid rgba(255,255,255,0.08);

            padding:20px;
        }

        .logo-box{

            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .logo{

            width:60px;
            height:60px;

            border-radius:20px;

            background:linear-gradient(135deg,#7c3aed,#2563eb);

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:24px;
            font-weight:700;
        }

        .new-chat-btn{

            border:none;

            padding:14px;

            border-radius:14px;

            background:linear-gradient(135deg,#7c3aed,#2563eb);

            color:white;

            cursor:pointer;

            transition:0.3s;
        }

        .new-chat-btn:hover{

            transform:translateY(-2px);
        }

        .history{

            margin-top:30px;

            display:flex;
            flex-direction:column;
            gap:10px;

            overflow-y:auto;
        }

        .history-item{

            padding:12px;

            border-radius:12px;

            background:rgba(255,255,255,0.05);

            font-size:14px;

            transition:0.3s;
        }

        .history-item:hover{

            background:rgba(255,255,255,0.08);
        }

        /* Main */

        .main-container{

            flex:1;

            display:flex;
            flex-direction:column;
        }

        /* Header */

        .topbar{

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px;

            border-bottom:1px solid rgba(255,255,255,0.08);

            background:rgba(255,255,255,0.03);

            backdrop-filter:blur(20px);
        }

        .profile{

            display:flex;
            align-items:center;
            gap:15px;
        }

        .avatar{

            width:50px;
            height:50px;

            border-radius:50%;

            background:linear-gradient(135deg,#7c3aed,#2563eb);

            display:flex;
            justify-content:center;
            align-items:center;

            font-weight:700;

            box-shadow:0 0 15px rgba(124,58,237,0.4);
        }

        .profile p{

            font-size:13px;

            color:#94a3b8;
        }

        .actions{

            display:flex;
            gap:10px;
        }

        .icon-btn{

            width:45px;
            height:45px;

            border:none;

            border-radius:14px;

            background:rgba(255,255,255,0.06);

            color:white;

            cursor:pointer;

            font-size:18px;

            transition:0.3s;
        }

        .icon-btn:hover{

            transform:scale(1.05);

            background:rgba(255,255,255,0.12);
        }

        /* Chat */

        .chat-box{

            flex:1;

            overflow-y:auto;

            padding:25px;

            display:flex;
            flex-direction:column;

            gap:18px;

            scroll-behavior:smooth;
        }

        .chat-box::-webkit-scrollbar{

            width:6px;
        }

        .chat-box::-webkit-scrollbar-thumb{

            background:#334155;

            border-radius:20px;
        }

        .message{

            max-width:75%;

            padding:15px 18px;

            border-radius:18px;

            line-height:1.7;

            animation:fadeIn 0.3s ease;
        }

        .user-message{

            align-self:flex-end;

            background:linear-gradient(135deg,#7c3aed,#2563eb);

            box-shadow:0 5px 15px rgba(124,58,237,0.25);
        }

        .bot-message{

            align-self:flex-start;

            background:rgba(255,255,255,0.06);

            border:1px solid rgba(255,255,255,0.05);
        }

        .message pre{

            background:#0f172a;

            padding:12px;

            border-radius:10px;

            overflow:auto;

            margin-top:10px;
        }

        .message code{

            color:#60a5fa;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Input */

        .input-area{

            display:flex;
            gap:15px;

            padding:20px;

            border-top:1px solid rgba(255,255,255,0.08);

            background:rgba(255,255,255,0.03);
        }

        #user-input{

            flex:1;

            resize:none;

            height:60px;

            border:none;

            outline:none;

            border-radius:16px;

            padding:15px;

            background:rgba(255,255,255,0.07);

            color:white;

            font-size:15px;
        }

        #user-input::placeholder{

            color:#94a3b8;
        }

        #send-btn{

            width:60px;
            height:60px;

            border:none;

            border-radius:18px;

            background:linear-gradient(135deg,#7c3aed,#2563eb);

            color:white;

            font-size:22px;

            cursor:pointer;

            transition:0.3s;
        }

        #send-btn:hover{

            transform:scale(1.05);
        }

        #send-btn:disabled{

            opacity:0.6;

            cursor:not-allowed;
        }

        /* Typing Animation */

        .typing{

            display:flex;
            gap:5px;
        }

        .typing span{

            width:8px;
            height:8px;

            background:white;

            border-radius:50%;

            animation:bounce 1s infinite;
        }

        .typing span:nth-child(2){
            animation-delay:0.2s;
        }

        .typing span:nth-child(3){
            animation-delay:0.4s;
        }

        @keyframes bounce{

            0%,80%,100%{
                transform:scale(0.8);
                opacity:0.5;
            }

            40%{
                transform:scale(1.2);
                opacity:1;
            }
        }

        /* Light Theme */

        .light-theme{

            background:#f1f5f9;

            color:black;
        }

        .light-theme .sidebar,
        .light-theme .topbar,
        .light-theme .input-area{

            background:white;
        }

        .light-theme .bot-message{

            background:#e2e8f0;

            color:black;
        }

        .light-theme #user-input{

            color:black;
        }

        /* Mobile */

        @media(max-width:768px){

            .sidebar{
                display:none;
            }

            .message{
                max-width:90%;
            }
        }

    </style>

</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo-box">

            <div class="logo">
                V
            </div>

            <h2>Victor AI</h2>

            <button onclick="newChat()" class="new-chat-btn">
                + New Chat
            </button>

        </div>

        <div class="history" id="history"></div>

    </div>

    <!-- Main -->
    <div class="main-container">

        <!-- Header -->
        <div class="topbar">

            <div class="profile">

                <div class="avatar">
                    V
                </div>

                <div>

                    <h3>Victor AI</h3>

                    <p>Smart AI Assistant</p>

                </div>

            </div>

            <div class="actions">

                <button onclick="toggleTheme()" class="icon-btn">
                    🌙
                </button>

                <button onclick="exportChat()" class="icon-btn">
                    ⬇
                </button>

            </div>

        </div>

        <!-- Chat -->
        <div class="chat-box" id="chat-box">

            <div class="message bot-message">
                👋 Hello! I'm Victor AI.
            </div>

        </div>

        <!-- Input -->
        <div class="input-area">

            <textarea
                id="user-input"
                placeholder="Message Victor AI..."
            ></textarea>

            <button
                id="send-btn"
                onclick="sendMessage()"
            >
                ➤
            </button>

        </div>

    </div>

    <script>

        let isSending = false;

        function addHistory(text){

            const history = document.getElementById("history");

            const item = document.createElement("div");

            item.className = "history-item";

            item.innerText = text.substring(0,40);

            history.prepend(item);
        }

        async function sendMessage(){

            if(isSending) return;

            const input = document.getElementById("user-input");

            const message = input.value.trim();

            if(message === "") return;

            const chatBox = document.getElementById("chat-box");

            const sendBtn = document.getElementById("send-btn");

            isSending = true;

            sendBtn.disabled = true;

            addHistory(message);

            // User Message
            const userDiv = document.createElement("div");

            userDiv.className = "message user-message";

            userDiv.innerText = message;

            chatBox.appendChild(userDiv);

            input.value = "";

            // Typing Animation
            const typingDiv = document.createElement("div");

            typingDiv.className = "message bot-message";

            typingDiv.innerHTML = `
                <div class="typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;

            chatBox.appendChild(typingDiv);

            chatBox.scrollTop = chatBox.scrollHeight;

            try{

                const response = await fetch("/chat",{

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({
                        message:message
                    })
                });

                const data = await response.json();

                typingDiv.innerHTML = marked.parse(data.reply);

            }
            catch(error){

                typingDiv.innerText =
                    "Error connecting to Victor AI.";
            }

            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {

                isSending = false;

                sendBtn.disabled = false;

            }, 1000);
        }

        document
            .getElementById("user-input")
            .addEventListener("keypress", function(event){

                if(event.key === "Enter" && !event.shiftKey){

                    event.preventDefault();

                    sendMessage();
                }
        });

        function toggleTheme(){

            document.body.classList.toggle("light-theme");
        }

        function exportChat(){

            const chat = document.getElementById("chat-box").innerText;

            const blob = new Blob([chat], { type: "text/plain" });

            const a = document.createElement("a");

            a.href = URL.createObjectURL(blob);

            a.download = "victor_ai_chat.txt";

            a.click();
        }

        function newChat(){

            const chatBox = document.getElementById("chat-box");

            chatBox.innerHTML = `
                <div class="message bot-message">
                    👋 New chat started with Victor AI.
                </div>
            `;
        }

    </script>

</body>

</html>
